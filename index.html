<!DOCTYPE html>
<html>
<head>
  <title>User Feed</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#f0f2f5; margin:0; }
    .header { background:#1877f2; color:white; padding:15px; text-align:center; }
    .container { width:500px; margin:20px auto; }
    .post { background:white; padding:15px; border-radius:8px; margin-bottom:15px; }
    img { width:100%; margin-top:10px; border-radius:8px; }

    .modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.modal img {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  animation: zoom 0.3s;
}

@keyframes zoom {
  from { transform: scale(0.8); }
  to { transform: scale(1); }
}

.post img {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;   /* 👈 This makes it a hand */
  transition: 0.2s;
}

.post img:hover {
  opacity: 0.9;      /* optional nice effect */
  transform: scale(1.02); /* small zoom effect */
}
  </style>
</head>
<body>

<!-- Image Modal -->
<div id="imageModal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<div class="header">User Feed</div>

<div class="container">
  <div id="posts"></div>
</div>

<script>
const { createClient } = supabase;

const client = createClient(
  "https://ixhsiwkkdwcaagckjeyt.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aHNpd2trZHdjYWFnY2tqZXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzY3NDAsImV4cCI6MjA4MDIxMjc0MH0.Amo_FM2wQd5Iw3l-TnlGawZmdW9wTnxLn2A23N8TKos"
);

function formatContent(text) {
  if (!text) return "";

  // Convert new lines to <br>
  let formatted = text.replace(/\n/g, "<br>");

  // Convert URLs to clickable links
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  formatted = formatted.replace(urlRegex, function(url) {
    return `<a href="${url}" target="_blank">${url}</a>`;
  });

  return formatted;
}

function openModal(imageUrl) {
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImg");

  modal.style.display = "block";
  modalImg.src = imageUrl;
}

function closeModal() {
  document.getElementById("imageModal").style.display = "none";
}

async function loadPosts() {
  const { data } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  data.forEach(post => {
    postsDiv.innerHTML += `
      <div class="post">
        <p>${formatContent(post.content)}</p>
        ${post.image_url ? `<img src="${post.image_url}" onclick="openModal('${post.image_url}')">` : ""}
      </div>
    `;
  });
}

loadPosts();
</script>
</body>
</html>
